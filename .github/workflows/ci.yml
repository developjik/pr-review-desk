name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify SwiftPM app, harness, and package
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version
          swift -e 'import Foundation; print("Foundation import ok")'

      - name: Run verification gate
        run: scripts/verify.sh

      - name: Build release app
        run: swift build -c release --product PRReviewDeskApp

      - name: Package app
        run: scripts/package-app.sh

      - name: Validate package
        run: scripts/validate-package.sh
